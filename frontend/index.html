<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Petrofac HSE Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Petrofac HSE Tracker</h2>
        <div>
            <a href="index.html" class="active">Dashboard</a>
            <a href="events.html">Training Events</a>
            <a href="registrations.html">Registrations</a>
        </div>
    </nav>
    <div class="container">
        <h3>Dashboard</h3>
        <div class="stats">
            <div class="stat-box">Total Events: <span id="totalEvents">0</span></div>
            <div class="stat-box">Upcoming: <span id="upcomingEvents">0</span></div>
            <div class="stat-box">Registrations: <span id="totalRegs">0</span></div>
            <div class="stat-box">Completed: <span id="completedEvents">0</span></div>
        </div>
        <h4>Recent Activity</h4>
        <table id="dashTable">
            <thead>
                <tr>
                    <th>Event</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Registrations</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
